<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>长安岁华 · 唐风人生录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --shell: #252423;
      --shell-rim: #3a3836;
      --paper: #f7f4ee;
      --card: #fffefb;
      --ink: #1a1917;
      --muted: #6b6560;
      --accent: #9e2a2b;
      --accent-soft: #c44536;
      --teal: #2a6d6b;
      --bar-track: #e3ded4;
      --nav-bg: #ece6dc;
      --age-green: #2db573;
      --age-green-dark: #1f8f5c;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #1e1d1b;
      background-image: linear-gradient(165deg, #2a2826 0%, #1a1918 45%, #141312 100%);
    }

    body {
      font-family: "Noto Sans SC", system-ui, sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.65rem 0.5rem calc(0.65rem + var(--safe-bottom));
    }

    .device {
      width: 100%;
      max-width: 400px;
      height: min(820px, calc(100vh - 1.2rem));
      max-height: min(820px, calc(100vh - 1.2rem));
      background: var(--shell);
      border-radius: 28px;
      padding: 8px;
      box-shadow: 0 0 0 1px var(--shell-rim), 0 20px 50px rgba(0, 0, 0, 0.45);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .device-notch {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 26px;
      background: #000;
      border-radius: 16px;
      z-index: 20;
      pointer-events: none;
    }

    .app {
      background: var(--paper);
      border-radius: 22px;
      overflow: hidden;
      height: 100%;
      max-height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .screen {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }

    .screen.active { display: flex; }

    /* —— 开局 —— */
    #screen-create { overflow-y: auto; }
    .splash {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }
    .create-body { padding: 1rem 1.1rem 1.25rem; }
    .create-body h1 {
      margin: 0 0 0.15rem;
      font-family: "Ma Shan Zheng", cursive;
      font-size: 1.75rem;
      color: var(--accent);
      letter-spacing: 0.08em;
    }
    .create-body .sub { margin: 0 0 1rem; font-size: 0.78rem; color: var(--muted); }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    input[type="text"], select {
      width: 100%;
      padding: 0.65rem 0.75rem;
      font-family: inherit;
      font-size: 0.95rem;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 10px;
      background: #fff;
      margin-bottom: 0.85rem;
    }
    button.primary {
      width: 100%;
      padding: 0.85rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }

    /* —— 游戏主壳：竖向卡片 + 人生模拟器层级 —— */
    #screen-play {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .play-main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .sim-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--card);
      margin: 0.35rem 0.4rem 0.45rem;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }

    .sim-brand {
      flex-shrink: 0;
      text-align: center;
      font-family: "Ma Shan Zheng", cursive;
      font-size: 0.95rem;
      color: var(--accent-soft);
      letter-spacing: 0.12em;
      padding: 0.4rem 0.5rem 0.15rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    /* 顶部角色栏：姓名 + 年龄最醒目 */
    .sim-identity {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      gap: 0.45rem;
      padding: 0.45rem 0.55rem 0.4rem;
      background: linear-gradient(180deg, #faf8f3 0%, var(--card) 100%);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    .sim-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }
    .sim-id-center {
      flex: 1;
      min-width: 0;
    }
    .sim-name-age {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.35rem;
    }
    .sim-name {
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 0.04em;
      color: var(--ink);
      line-height: 1.15;
    }
    .sim-agebox {
      flex-shrink: 0;
      text-align: right;
      line-height: 1;
    }
    .sim-age-num {
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--teal);
      font-variant-numeric: tabular-nums;
    }
    .sim-age-suf {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      margin-left: 1px;
    }
    .sim-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.2rem;
      line-height: 1.35;
    }
    .sim-dot { margin: 0 0.2rem; opacity: 0.5; }
    .sim-phase-line {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.25rem;
    }
    .sim-phase-pill {
      font-size: 0.62rem;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      letter-spacing: 0.04em;
    }
    .sim-era {
      font-size: 0.62rem;
      color: var(--muted);
    }
    .sim-money {
      flex-shrink: 0;
      text-align: right;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 0.2rem;
      border-left: 1px solid rgba(0, 0, 0, 0.06);
      min-width: 3.2rem;
    }
    .sim-money-lbl { font-size: 0.58rem; color: var(--muted); }
    .sim-money-val {
      font-size: 1.05rem;
      font-weight: 800;
      color: #a67c1c;
      font-variant-numeric: tabular-nums;
    }

    /* 属性条：紧凑状态栏 */
    .sim-stats {
      flex-shrink: 0;
      padding: 0.35rem 0.5rem 0.4rem;
      background: #f3efe8;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      max-height: 30vh;
      overflow-y: auto;
    }
    .stat-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.22rem;
    }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-name {
      width: 2rem;
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
    }
    .stat-track {
      flex: 1;
      height: 7px;
      background: var(--bar-track);
      border-radius: 4px;
      overflow: hidden;
    }
    .stat-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .stat-fill.hp { background: linear-gradient(90deg, #5eb8e8, #2d8fc9); }
    .stat-fill.study { background: linear-gradient(90deg, #9b7bd8, #6b4fc9); }
    .stat-fill.look { background: linear-gradient(90deg, #e891b0, #c94d7c); }
    .stat-fill.mind { background: linear-gradient(90deg, #3fbfb0, #2a8f85); }
    .stat-fill.home { background: linear-gradient(90deg, #d4a012, #9a6b12); }
    .stat-fill.fame { background: linear-gradient(90deg, #e8a23a, #c97816); }
    .stat-pct {
      width: 1.75rem;
      text-align: right;
      font-size: 0.62rem;
      font-weight: 700;
      color: #555;
      font-variant-numeric: tabular-nums;
    }

    /* 主事件区：视觉中心 */
    .sim-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, #fffdf9 0%, #f9f6ef 100%);
      border-top: 1px solid rgba(158, 42, 43, 0.12);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    .sim-stage-inner {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.65rem 0.65rem 0.75rem;
    }
    .stage-tag {
      font-size: 0.58rem;
      font-weight: 700;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0 0 0.35rem;
    }
    .stage-title {
      font-family: "Ma Shan Zheng", cursive;
      font-size: 1.28rem;
      color: var(--accent);
      margin: 0 0 0.45rem;
      line-height: 1.25;
    }
    .stage-body {
      font-size: 0.82rem;
      line-height: 1.65;
      color: #2e2c28;
      margin: 0 0 0.65rem;
    }
    .stage-body--compact { font-size: 0.78rem; margin-bottom: 0.45rem; }
    .stage-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }
    .stage-choices {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .stage-choice-btn {
      width: 100%;
      text-align: left;
      font-family: inherit;
      font-size: 0.8rem;
      line-height: 1.45;
      padding: 0.62rem 0.65rem;
      border-radius: 10px;
      border: 1px solid rgba(158, 42, 43, 0.28);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: background 0.15s, transform 0.08s;
    }
    .stage-choice-btn:active { transform: scale(0.99); background: #fff9f5; }

    /* 主操作：加一岁 */
    .sim-primary-wrap {
      flex-shrink: 0;
      padding: 0.45rem 0.65rem 0.35rem;
      background: var(--card);
    }
    .btn-sim-primary {
      width: 100%;
      padding: 0.72rem 1rem;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(180deg, #3dde8a 0%, var(--age-green) 42%, var(--age-green-dark) 100%);
      box-shadow: 0 4px 0 #156644, 0 6px 14px rgba(0, 80, 50, 0.25);
      transition: transform 0.1s, filter 0.15s;
    }
    .btn-sim-primary:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      filter: grayscale(0.25);
      box-shadow: 0 2px 0 #666;
    }
    .btn-sim-primary:not(:disabled):active { transform: scale(0.99); }

    /* 底部功能导航 */
    .sim-nav {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.28rem;
      padding: 0 0.5rem 0.35rem;
      background: var(--card);
    }
    .sim-nav-btn {
      border: none;
      border-radius: 9px;
      background: var(--nav-bg);
      color: #4a453c;
      font-family: inherit;
      font-size: 0.58rem;
      font-weight: 600;
      padding: 0.42rem 0.15rem;
      cursor: pointer;
      line-height: 1.2;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
    }
    .sim-nav-btn:active { background: #e0d8cc; }

    /* 纪事条：克制 */
    .sim-chronicle {
      flex-shrink: 0;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      background: #f0ebe3;
      padding: 0.3rem 0.5rem 0.4rem;
      max-height: 72px;
    }
    .sim-chronicle-label {
      font-size: 0.55rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
    }
    .sim-chronicle-scroll {
      max-height: 48px;
      overflow-y: auto;
      font-size: 0.65rem;
      line-height: 1.4;
      color: #5a544c;
    }
    .feed-line {
      padding-bottom: 0.25rem;
      border-bottom: 1px dashed rgba(0, 0, 0, 0.06);
      margin-bottom: 0.25rem;
    }
    .feed-line:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .feed-line .when {
      font-size: 0.58rem;
      color: #9a948c;
      margin-bottom: 0.1rem;
    }
    .feed-hint {
      color: var(--muted);
      font-size: 0.65rem;
      text-align: center;
      line-height: 1.45;
      padding: 0.2rem 0;
    }

    /* —— 子页面（自底部滑入）—— */
    .subpage-root {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 50;
      background: #ebe4d7;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
    }
    .subpage-root.open {
      transform: translateY(0);
      pointer-events: auto;
    }
    .subpage-toolbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      background: linear-gradient(180deg, #f2ebe0 0%, #ebe4d7 100%);
      position: relative;
      min-height: 48px;
    }
    .subpage-back {
      border: none;
      background: rgba(0, 0, 0, 0.06);
      color: var(--ink);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 600;
      padding: 0.4rem 0.65rem;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }
    .subpage-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 800;
      font-size: 1rem;
      pointer-events: none;
      z-index: 1;
    }
    .subpage-toolbar-spacer {
      width: 72px;
      flex-shrink: 0;
      visibility: hidden;
    }
    .subpage-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0.75rem 0.85rem 1rem;
    }
    .subpage-body-center {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-sheet {
      font-size: 0.85rem;
      line-height: 1.55;
      color: #3d3a36;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }
    .detail-k { font-weight: 600; }
    .detail-v { color: var(--muted); font-size: 0.8rem; }
    .detail-sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin: -0.15rem 0 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .affinity-track {
      flex: 1;
      max-width: 120px;
      height: 8px;
      background: rgba(0, 0, 0, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .affinity-fill {
      height: 100%;
      background: linear-gradient(90deg, #c44536, #e5989b);
      border-radius: 4px;
    }
    .affinity-num { font-weight: 700; color: #555; font-size: 0.72rem; }
    .prose-block p { margin: 0 0 0.65rem; }
    .prose-block .muted { font-size: 0.78rem; color: var(--muted); }
    .prose-block .small { font-size: 0.72rem; }

    #screen-end {
      overflow-y: auto;
      padding: 2rem 1.25rem 1.5rem;
      text-align: center;
      justify-content: center;
      background: #e8e2d9;
    }
    #screen-end .end-portrait {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 1rem;
      border: 4px solid #fff;
    }
    #screen-end h2 {
      font-family: "Ma Shan Zheng", cursive;
      font-size: 1.65rem;
      color: var(--accent);
    }
    #screen-end .epitaph { font-size: 0.9rem; line-height: 1.7; color: #3d3a36; }
    #screen-end .muted { font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; }
    #end-identity { font-size: 0.88rem; color: #4a453c; margin: 0 0 0.75rem; line-height: 1.6; }

    .fine-print {
      max-width: 400px;
      margin: 0.75rem auto 0;
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
      line-height: 1.45;
      padding: 0 0.75rem;
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="device-notch" aria-hidden="true"></div>
    <div class="app" id="app">
      <section class="screen active" id="screen-create">
        <img class="splash" src="assets/tang-scene-city.png" alt="" />
        <div class="create-body">
          <h1>长安岁华</h1>
          <p class="sub">唐风人生录 · 架空故事 · 仅供娱乐</p>
          <p class="sub" style="margin-bottom:0.75rem">将随机：姓、名、性别、出身、籍贯；亦可自填后开卷。</p>
          <button type="button" class="primary" id="btn-randomize" style="margin-bottom:0.85rem;background:var(--dock-light)">掷筹 · 随机起名</button>
          <label for="familyName">姓（可空则随机）</label>
          <input type="text" id="familyName" placeholder="如：李" maxlength="4" />
          <label for="givenName">名</label>
          <input type="text" id="givenName" placeholder="如：子谦" maxlength="6" />
          <label for="gender">称谓</label>
          <select id="gender">
            <option value="男">男子</option>
            <option value="女">女子</option>
          </select>
          <button type="button" class="primary" id="btn-start">开卷 · 降生</button>
        </div>
      </section>

      <section class="screen" id="screen-play">
        <div class="play-main">
          <div class="sim-card">
            <div class="sim-brand">长安岁华</div>
            <div class="sim-identity">
              <img class="sim-avatar" id="hdr-avatar" src="assets/tang-portrait-male.png" alt="" />
              <div class="sim-id-center">
                <div class="sim-name-age">
                  <span class="sim-name" id="hdr-name">李子谦</span>
                  <div class="sim-agebox">
                    <span class="sim-age-num" id="hdr-age">0</span><span class="sim-age-suf">岁</span>
                  </div>
                </div>
                <div class="sim-meta">
                  <span id="hdr-gender">男子</span><span class="sim-dot">·</span>
                  <span id="hdr-origin">士族</span><span class="sim-dot">·</span>
                  <span>居 <span id="hdr-city">长安</span></span>
                </div>
                <div class="sim-phase-line">
                  <span class="sim-phase-pill" id="hdr-phase">童蒙</span>
                  <span class="sim-era" id="hdr-era">开元 713 年 · 长安</span>
                </div>
              </div>
              <div class="sim-money">
                <span class="sim-money-lbl">银钱</span>
                <span class="sim-money-val" id="hdr-wealth">50</span>
              </div>
            </div>

            <div class="sim-stats" id="stat-bars"></div>

            <div class="sim-stage" id="sim-stage">
              <div class="sim-stage-inner" id="stage-inner"></div>
            </div>

            <div class="sim-primary-wrap">
              <button type="button" class="btn-sim-primary" id="btn-next-year">加一岁</button>
            </div>

            <nav class="sim-nav" aria-label="功能入口">
              <button type="button" class="sim-nav-btn" id="btn-family">家庭</button>
              <button type="button" class="sim-nav-btn" id="btn-study">学业</button>
              <button type="button" class="sim-nav-btn" id="btn-career">仕途</button>
              <button type="button" class="sim-nav-btn" id="btn-relations">关系</button>
              <button type="button" class="sim-nav-btn" id="btn-assets">资产</button>
            </nav>

            <div class="sim-chronicle">
              <div class="sim-chronicle-label">纪事</div>
              <div class="sim-chronicle-scroll" id="life-feed"></div>
            </div>
          </div>

          <div class="subpage-root" id="subpage-root" aria-hidden="true">
            <div class="subpage-toolbar">
              <button type="button" class="subpage-back" id="subpage-back">← 返回</button>
              <span class="subpage-title" id="subpage-title">面板</span>
